    <style>
        :root { --azul: #004a99; --rojo: #e31e24; --amarillo: #ffcc00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f8f9fa; color: #333; }
        
        /* HEADER Y LOGO */
        header { 
            background: var(--azul); color: white; padding: 12px 0; text-align: center; border-bottom: 4px solid var(--amarillo); 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; max-width: 1200px; margin: 0 auto; }
        .logo-img { width: 50px; height: 50px; object-fit: contain; }
        .brand-name { font-size: 1.6rem; font-weight: 900; margin: 0; }

        /* HERO: USANDO header-real.jpg CON OSCURIDAD 0.4 */
        .hero { 
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('header-real.jpg'); 
            background-size: cover; 
            background-position: center; 
            color: white; 
            padding: 100px 20px; 
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hero h1 { font-size: 3.2rem; font-weight: 900; text-transform: uppercase; margin: 0; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        .hero h1 span { color: var(--amarillo); }
        .hero p { font-size: 1.5rem; font-weight: 600; margin: 15px 0; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); line-height: 1.2; }
        
        .cta-btn { 
            background: var(--rojo); color: white; padding: 18px 45px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 1.4rem; display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: transform 0.2s;
        }
        .cta-btn:active { transform: scale(0.95); }

        /* GRILLA DE SERVICIOS */
        .services { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; max-width: 1100px; margin: -40px auto 40px; padding: 0 20px;
            position: relative; z-index: 2;
        }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.15); text-align: center; border: 1px solid #eee; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card h3 { color: var(--azul); margin: 0; font-size: 1.2rem; font-weight: 800; }
        
        /* BOTÓN FLOTANTE WHATSAPP */
        .ws-float { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            color: white; width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 35px; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 9999; 
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1.2rem; }
        }
    </style>

    <section class="hero">
        <h1>TECNICO <span>YA</span></h1>

        <a href="tel:+573045864731" class="cta-btn">¡SOLICITAR TÉCNICO!</a>

    <div class="services">
        <div class="card"><img src="lavadora.webp" alt="Reparación de Lavadoras"><div class="card-body"><h3>Lavadoras</h3></div></div>
        <div class="card"><img src="nevera.webp" alt="Reparación de Neveras"><div class="card-body"><h3>Neveras</h3></div></div>
        <div class="card"><img src="aire acondicionado.webp" alt="Reparación de Aires"><div class="card-body"><h3>Aires</h3></div></div>
        <div class="card"><img src="calentador.webp" alt="Reparación de Estufas"><div class="card-body"><h3>Estufas</h3></div></div>
