<!DOCTYPE html>
<html lang="es">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>

        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #fff; }
        header { display: flex; justify-content: space-between; padding: 15px 5%; align-items: center; border-bottom: 1px solid #ddd; }

        .img-box { width: 100%; height: 350px; background: #333; overflow: hidden; border-radius: 15px 15px 0 0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info-card { background: var(--gris); padding: 40px; border-radius: 0 0 15px 15px; border-bottom: 8px solid var(--azul); }
        h3 { color: var(--azul); font-size: 30px; text-align: center; margin: 0 0 15px; font-weight: 900; }
        .lista { list-style: none; padding: 0; margin: 0 auto; max-width: 400px; }
        .lista li { margin-bottom: 12px; font-size: 18px; font-weight: bold; padding-left: 35px; position: relative; }
        .lista li::before { content: "\f00c"; font-family: "Font Awesome 5 Free"; font-weight: 900; color: var(--verde); position: absolute; left: 0; }
        .ws-float { position: fixed; bottom: 20px; right: 20px; background: var(--verde); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 35px; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
